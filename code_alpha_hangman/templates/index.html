<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangman Game</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#4facfe,#00f2fe);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            width:500px;
            background:#fff;
            padding:40px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,.3);
            text-align:center;
        }

        h1{
            color:#333;
            margin-bottom:15px;
        }

        p{
            color:#555;
            margin-bottom:25px;
            line-height:1.6;
        }

        .word{
            font-size:35px;
            letter-spacing:12px;
            margin:30px 0;
            color:#0077ff;
            font-weight:bold;
        }

        input{
            width:80px;
            padding:12px;
            font-size:22px;
            text-align:center;
            border:2px solid #0077ff;
            border-radius:8px;
            outline:none;
        }

        button{
            margin-top:20px;
            width:100%;
            padding:15px;
            background:#0077ff;
            color:white;
            border:none;
            border-radius:8px;
            font-size:18px;
            cursor:pointer;
            transition:.3s;
        }

        button:hover{
            background:#0056d6;
        }

        .info{
            margin-top:30px;
            text-align:left;
            background:#f7f7f7;
            padding:15px;
            border-radius:10px;
        }

        .info p{
            margin:8px 0;
        }

        footer{
            margin-top:25px;
            color:gray;
            font-size:14px;
        }
    </style>

</head>

<body>

<div class="container">

    <h1>🎮 Hangman Game</h1>

    <p>
        Guess the hidden word one letter at a time.
        You have only <b>6 incorrect guesses</b>.
    </p>

    <div class="word">
        _ _ _ _ _ _
    </div>

    <form>

        <input
        type="text"
        maxlength="1"
        placeholder="A"
        required>

        <br>

        <button type="submit">
            Guess Letter
        </button>

    </form>

    <div class="info">

        <p><b>Wrong Attempts:</b> 0 / 6</p>

        <p><b>Guessed Letters:</b> None</p>

        <p><b>Status:</b> Game Started</p>

    </div>

    <footer>
        CodeAlpha Python Internship - Task 1
    </footer>

</div>

</body>
</html>
